<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>VetCMU Environment Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; width: 450px; height: 781px; background: #1a1a1a; color: white; font-family: 'Kanit', sans-serif; display: flex; justify-content: center; align-items: center; }
        .card { width: 90%; background: #2d2d2d; padding: 20px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .time { font-size: 50px; font-weight: 700; }
        .date { font-size: 20px; color: #aaa; margin-bottom: 20px; }
        .weather-box { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .val { font-size: 30px; font-weight: 700; }
        .label { font-size: 14px; color: #888; }
        #aqi-display { font-size: 80px; font-weight: 700; margin: 10px 0; padding: 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="time" id="clock">00:00</div>
    <div class="date" id="date">--/--/----</div>
    <div class="weather-box">
        <div><div class="val" id="temp">--°C</div><div class="label">อุณหภูมิ</div></div>
        <div><div class="val" id="aqi-val">--</div><div class="label">AQI</div></div>
    </div>
    <div id="aqi-display">สถานะ...</div>
</div>

<script>
    // 1. นาฬิกา
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('date').innerText = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // 2. ข้อมูลสภาพอากาศและฝุ่น (ต้องใส่ API Key ของท่าน)
    async function fetchData() {
        // อุณหภูมิ: ต.สุเทพ
        const lat = 18.78, lon = 98.95;
        const weather = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=YOUR_API_KEY&units=metric`).then(r => r.json());
        document.getElementById('temp').innerText = Math.round(weather.main.temp) + "°C";

        // AQI: ใกล้ คณะสัตวแพทย์ มช. (สถานีรหัส: @13396 หรือใกล้เคียง)
        const aqiRes = await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=YOUR_WAQI_TOKEN`).then(r => r.json());
        const aqi = aqiRes.data.aqi;
        const disp = document.getElementById('aqi-display');
        document.getElementById('aqi-val').innerText = aqi;
        
        // กำหนดสีมาตรฐานสากล
        let color = aqi <= 50 ? "#00e400" : aqi <= 100 ? "#ffeb3b" : aqi <= 150 ? "#ff7e00" : "#ff0000";
        disp.innerText = aqi <= 50 ? "ดีมาก" : aqi <= 100 ? "ปานกลาง" : aqi <= 150 ? "เริ่มมีผลกระทบ" : "มีผลกระทบ";
        disp.style.backgroundColor = color;
        disp.style.color = aqi <= 100 ? "#000" : "#fff";
    }

    setInterval(updateClock, 1000);
    fetchData();
    setInterval(fetchData, 600000);
</script>
</body>
</html>
