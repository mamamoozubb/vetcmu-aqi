<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM2.5 Dashboard - Chiang Mai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ล็อกขนาดหน้าจอให้พอดีกับ 450x781 */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 200px; 
            height: 300px; 
            overflow: hidden; 
            background-color: #222;
        }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: background-color 1s ease;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 85%; /* ปรับความกว้างให้พอดีกับแนวตั้ง */
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 500px;
        }

        h1 { 
            font-size: 28px; 
            color: #333; 
            margin: 0; 
            line-height: 1.2;
        }

        #aqi-value { 
            font-size: 140px; /* ปรับขนาดให้พอดีกับความกว้าง 450px */
            font-weight: 700; 
            margin: 20px 0;
            line-height: 1;
        }

        #status-text { 
            font-size: 32px; 
            font-weight: 700; 
            padding: 15px 30px;
            border-radius: 20px;
            display: inline-block;
            color: white;
            margin-bottom: 20px;
        }

        .footer { 
            font-size: 16px; 
            color: #666; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>คุณภาพอากาศ (AQI)<br>เชียงใหม่</h1>
    <div id="aqi-value">--</div>
    <div>
        <div id="status-text">Loading...</div>
    </div>
    <div class="footer">อัปเดตข้อมูลอัตโนมัติจาก WAQI.info</div>
</div>

<script>
    const TOKEN = "demo"; // แนะนำให้เปลี่ยนเป็น Token จริงของคุณ
    const CITY = "chiangmai";

    async function updateAQI() {
        try {
            const res = await fetch(`https://api.waqi.info/feed/${CITY}/?token=${TOKEN}`);
            const json = await res.json();
            if (json.status === "ok") {
                const aqi = json.data.aqi;
                const display = document.getElementById('aqi-value');
                const status = document.getElementById('status-text');
                
                display.innerText = aqi;
                
                let color, label, textCol = "white";
                if (aqi <= 50) { color = "#00e400"; label = "ดีมาก"; }
                else if (aqi <= 100) { color = "#ffeb3b"; label = "ปานกลาง"; textCol = "#000"; }
                else if (aqi <= 150) { color = "#ff7e00"; label = "เริ่มมีผลกระทบ"; }
                else if (aqi <= 200) { color = "#f44336"; label = "มีผลกระทบต่อสุขภาพ"; }
                else { color = "#9c27b0"; label = "อันตรายมาก"; }

                document.body.style.backgroundColor = color;
                display.style.color = color;
                status.style.backgroundColor = color;
                status.style.color = textCol;
                status.innerText = label;
            }
        } catch (e) { 
            console.error(e);
            document.getElementById('status-text').innerText = "Error";
        }
    }

    updateAQI();
    setInterval(updateAQI, 600000); // อัปเดตทุก 10 นาที
</script>
</body>
</html>
