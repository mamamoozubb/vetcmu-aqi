<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VetCMU AQI Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
      body, html { margin: 0; padding: 0; width: 447px; height: 980px; overflow: hidden; background-color: #000; }
      body { font-family: "Sarabun", sans-serif; display: flex; flex-direction: column; align-items: center; text-align: center; color: white; }
      .divider { width: 80%; height: 1px; background: rgba(255, 255, 255, 0.2); margin: 10px 0; }
      .section { width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
      #clock { font-size: 80px; font-weight: 700; margin: 0; color: #c38fff; }
      #date { font-size: 24px; opacity: 0.8; margin-top: 10px; }
      .weather-box { font-size: 80px; font-weight: 400; }
      .temp { font-weight: 700; }
      h1 { font-size: 22px; margin: 0; font-weight: 400; color: #ccc; }
      #aqi-value { font-size: 150px; font-weight: 700; line-height: 1; margin: 10px 0; }
      #status-text { font-size: 38px; font-weight: 700; display: block; }
      .footer-info { width: 100%; padding: 20px 0; background: rgba(255, 255, 255, 0.05); }
      .location { font-size: 16px; font-weight: 700; margin-bottom: 5px; }
      .sub-loc { font-size: 13px; opacity: 0.6; }
    </style>
  </head>
  <body>
    <div class="section">
      <div id="clock">00:00:00</div>
      <div id="date">กำลังโหลด...</div>
    </div>
    <div class="divider"></div>
    <div class="section weather-box">
      <h1>อุณหภูมิ (TEMP.)</h1>
      <div><span class="temp" id="temp-val">--</span>°C</div>
    </div>
    <div class="divider"></div>
    <div class="section aqi-section">
      <h1>ดัชนีคุณภาพอากาศ (AQI)</h1>
      <div id="aqi-value">--</div>
      <div id="status-text">กำลังโหลด...</div>
    </div>
    <div class="divider"></div>
    <div class="footer-info">
      <div class="location">คณะสัตวแพทยศาสตร์ มหาวิทยาลัยเชียงใหม่</div>
      <div class="sub-loc">155 ตำบลแม่เหียะ อำเภอเมือง จังหวัดเชียงใหม่ 50100</div>
    </div>

    <script>
      // เปลี่ยนไปใช้ HTTP แทน HTTPS ในบางจุดหากจอมีปัญหาเรื่อง SSL Certificate
      var TOKEN = "26eb7f1abeacbabe6777c644817ec2d12611d3b4";
      var LAT = "18.7588617";
      var LNG = "98.9403623";

      function updateClock() {
        var now = new Date();
        var h = ("0" + now.getHours()).slice(-2);
        var m = ("0" + now.getMinutes()).slice(-2);
        var s = ("0" + now.getSeconds()).slice(-2);
        document.getElementById("clock").innerHTML = h + ":" + m + ":" + s;

        var days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
        var months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        var thaiDate = "วัน" + days[now.getDay()] + "ที่ " + now.getDate() + " " + months[now.getMonth()] + " " + (now.getFullYear() + 543);
        document.getElementById("date").innerHTML = thaiDate;
      }

      function updateData() {
        var url = "https://api.waqi.info/feed/geo:" + LAT + ";" + LNG + "/?token=" + TOKEN;
        
        // ใช้ XMLHttpRequest แทน fetch เพราะจอรุ่นเก่าเสถียรกว่า
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.onreadystatechange = function () {
          if (xhr.readyState == 4 && xhr.status == 200) {
            var json = JSON.parse(xhr.responseText);
            if (json.status === "ok") {
              var aqi = json.data.aqi;
              var temp = (json.data.iaqi && json.data.iaqi.t) ? json.data.iaqi.t.v : null;

              document.getElementById("aqi-value").innerHTML = aqi;
              if (temp !== null) {
                document.getElementById("temp-val").innerHTML = Math.round(temp);
                var tColor = "#ffffff";
                if (temp < 25) tColor = "#00bfff";
                else if (temp < 30) tColor = "#4caf50";
                else if (temp < 35) tColor = "#ffeb3b";
                else if (temp < 38) tColor = "#ff9800";
                else tColor = "#f44336";
                document.getElementById("temp-val").style.color = tColor;
              }

              var aqiColor = "#ffffff";
              var label = "";
              if (aqi <= 50) { aqiColor = "#00e400"; label = "ดีมาก"; }
              else if (aqi <= 100) { aqiColor = "#ffeb3b"; label = "ปานกลาง"; }
              else if (aqi <= 150) { aqiColor = "#ff7e00"; label = "เริ่มมีผลกระทบ"; }
              else if (aqi <= 200) { aqiColor = "#ff0000"; label = "มีผลกระทบต่อสุขภาพ"; }
              else if (aqi <= 300) { aqiColor = "#8f3f97"; label = "อันตรายมาก"; }
              else { aqiColor = "#7e0023"; label = "อันตรายสูงสุด"; }

              document.getElementById("aqi-value").style.color = aqiColor;
              document.getElementById("status-text").style.color = aqiColor;
              document.getElementById("status-text").innerHTML = label;
            }
          }
        };
        xhr.send();
      }

      setInterval(updateClock, 1000);
      setInterval(updateData, 600000);
      updateClock();
      updateData();
    </script>
  </body>
</html>
